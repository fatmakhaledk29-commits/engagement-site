<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohamed & Fatma 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#fdeef5;
text-align:center;
overflow-x:hidden;
}

/* HERO */
.hero{
height:70vh;
background:url("images/couple.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.hero h1{
font-family:'Great Vibes';
font-size:60px;
margin:0;
}

/* SECTIONS */
.section{
padding:60px 20px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:400px;
margin:auto;
}

/* INPUT */
input,textarea{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
}

/* BUTTON */
button{
background:#d63384;
color:white;
border:none;
padding:10px 20px;
border-radius:25px;
cursor:pointer;
margin-top:10px;
}

/* GALLERY */
.gallery img{
width:100px;
margin:5px;
border-radius:10px;
}

/* QR */
.qr{
width:150px;
margin-top:15px;
}

/* MUSIC */
.music-btn{
position:fixed;
bottom:20px;
right:20px;
background:#d63384;
color:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
font-size:20px;
}

.small{
font-size:13px;
color:gray;
}

.footer{
margin:60px;
color:#b03060;
font-size:20px;
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
});
</script>

<!-- HERO -->
<div class="hero">
<h1>Mohamed & Fatma</h1>
<p>29 May 2026 • 6:00 PM</p>
</div>

<!-- SAVE THE DATE -->
<div class="card">
<h2 style="font-family:Great Vibes;font-size:40px;color:#d63384;">Save The Date 💍</h2>
<img src="images/invitation.jpg" style="width:100%;border-radius:15px;">
</div>

<!-- COUNTDOWN -->
<div class="section">
<h2>Countdown ⏳</h2>
<div id="count"></div>
</div>

<!-- LOCATION -->
<div class="section">
<div class="card">
<h3>Location 📍</h3>
<p>Saraya Oseem - Kom Oseem - Fayoum</p>

<iframe 
src="https://maps.google.com/maps?q=Kom%20Oseem%20Fayoum&output=embed"
width="100%" height="200" style="border-radius:15px;border:0;">
</iframe>

</div>
</div>

<!-- GUESTBOOK -->
<div class="section">
<div class="card">
<h3>Write Us 💌</h3>

<canvas id="c" width="300" height="150"
style="border:2px dashed #d63384;border-radius:10px;"></canvas>

<input id="name" placeholder="Your Name">
<textarea id="msg" placeholder="Message"></textarea>

<button onclick="saveMsg()">Send</button>

<div id="msgs"></div>

</div>
</div>

<!-- RSVP -->
<div class="section">
<div class="card">
<h3>Will You Join Us? 💖</h3>

<input id="rsvpName" placeholder="Your Name">

<br>
<button onclick="alert('Yay 💖')">Attending</button>
<button onclick="alert('We will miss you 😢')">Not Attending</button>

</div>
</div>

<!-- 📸 SINGLE UPLOAD + QR (زي ما طلبتي) -->
<div class="section">

<div class="card">

<h3>Send Your Memories 📸</h3>

<div class="small">
Upload your photos from our special day 💖
</div>

<input type="file" id="fileInput" multiple>
<br>
<button onclick="uploadFiles()">Upload Photos</button>

<div id="gallery" class="gallery"></div>

<!-- QR تحتها مباشرة -->
<img id="qr" class="qr">

<div class="small">
⭐ scan to upload or share ⭐
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
We can't wait to celebrate with you 💖
</div>

<script>

/* SCROLL */
let sec=document.querySelectorAll(".section");
window.addEventListener("scroll",()=>{
sec.forEach(s=>{
if(s.getBoundingClientRect().top < window.innerHeight-100){
s.classList.add("show");
}
});
});

/* MUSIC */
function toggleMusic(){
let m=document.getElementById("music");
m.paused ? m.play() : m.pause();
}

/* DRAW */
let c=document.getElementById("c");
let ctx=c.getContext("2d");
let draw=false;

c.onmousedown=()=>draw=true;
c.onmouseup=()=>draw=false;

c.onmousemove=(e)=>{
if(draw){
ctx.fillStyle="#d63384";
ctx.fillRect(e.offsetX,e.offsetY,2,2);
}
};

/* MESSAGES */
function saveMsg(){
let n=name.value;
let m=msg.value;

let data=JSON.parse(localStorage.getItem("msgs")||"[]");
data.push(n+" : "+m);

localStorage.setItem("msgs",JSON.stringify(data));
show();
}

function show(){
let data=JSON.parse(localStorage.getItem("msgs")||"[]");
msgs.innerHTML=data.map(x=>`<div style="background:#fff0f5;padding:8px;margin:5px;border-radius:10px">${x}</div>`).join("");
}
show();

/* UPLOAD LOCAL */
function uploadFiles(){
let input=fileInput;
for(let file of input.files){
let reader=new FileReader();
reader.onload=e=>{
let img=document.createElement("img");
img.src=e.target.result;
gallery.appendChild(img);
}
reader.readAsDataURL(file);
}
}

/* QR (واحد بس تحت upload) */
document.getElementById("qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+location.href;

</script>

</body>
</html>
